<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1f5bb8" />
  <title>Shane's Today To-Do List</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="app-header">
      <img src="icon-192.png" alt="To Do icon" class="app-icon" />
      <p class="eyebrow">Simple daily checklist</p>
      <h1>Shane's Today To-Do List</h1>
      <p class="subhead">Add tasks, tap to check them off, drag to reorder, then email or text the list to yourself.</p>
    </header>

    <section class="card">
      <div class="section-title-row">
        <div>
          <h2>Today's List</h2>
          <p class="hint">Type a task and tap Add, or paste several lines at once.</p>
        </div>
        <span id="taskCount" class="task-count">0 tasks</span>
      </div>

      <div class="input-row">
        <textarea id="taskInput" placeholder="Example:\nLaundry\nWork\nHamburgers"></textarea>
        <button id="addTaskBtn" class="primary small-button">Add</button>
      </div>

      <ul id="taskList" class="task-list" aria-label="Today's tasks"></ul>

      <p id="saveStatus" class="save-status" aria-live="polite"></p>

      <div class="button-stack">
        <button id="saveBtn" class="primary">Save List</button>
        <button id="emailBtn" class="success">Email to Me</button>
        <button id="textBtn" class="text-button">Text to Me</button>
        <button id="clearCompletedBtn" class="secondary">Clear Completed</button>
        <button id="clearAllBtn" class="danger-light">Clear List</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
