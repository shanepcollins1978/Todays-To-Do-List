<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shane's Today To-Do List</title>
  <meta name="description" content="A simple, mobile-friendly daily to-do list for capturing, organizing, and sending tasks." />
  <meta name="theme-color" content="#172554" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <section class="hero card">
      <div class="hero-top">
        <div class="brand-lockup">
          <img src="icons/icon-192.png" alt="To Do icon" class="app-icon" />
          <div>
            <p class="eyebrow">Daily focus list</p>
            <h1>Shane's Today To-Do List</h1>
          </div>
        </div>
        <button id="themeToggle" class="icon-button" type="button" aria-label="Toggle dark mode">☾</button>
      </div>
      <p class="hero-copy">Capture everything, choose what matters most, and send the list to yourself when you need it.</p>
      <div class="stats-grid" aria-label="Task summary">
        <div><span id="totalCount">0</span><small>Total</small></div>
        <div><span id="openCount">0</span><small>Open</small></div>
        <div><span id="doneCount">0</span><small>Done</small></div>
      </div>
    </section>

    <section class="card input-card">
      <label for="taskInput">Add task</label>
      <div class="input-row">
        <textarea id="taskInput" placeholder="Add one task or paste multiple lines..." rows="2"></textarea>
        <button id="addTaskBtn" class="primary-button" type="button">Add</button>
      </div>
      <div class="quick-row" aria-label="Quick add buttons">
        <button class="chip" data-template="Call ">Call</button>
        <button class="chip" data-template="Email ">Email</button>
        <button class="chip" data-template="Follow up with ">Follow up</button>
        <button class="chip" data-template="Review ">Review</button>
      </div>
    </section>

    <section class="card filter-card">
      <div class="section-header">
        <div>
          <p class="eyebrow">Today</p>
          <h2>Your list</h2>
        </div>
        <p id="saveStatus" class="save-status">Saved</p>
      </div>
      <div class="filter-row" role="tablist" aria-label="Filter tasks">
        <button class="filter active" data-filter="all" type="button">All</button>
        <button class="filter" data-filter="open" type="button">Open</button>
        <button class="filter" data-filter="done" type="button">Done</button>
      </div>
      <ul id="taskList" class="task-list" aria-live="polite"></ul>
      <div id="emptyState" class="empty-state">
        <strong>No tasks yet.</strong>
        <span>Add your first task above.</span>
      </div>
    </section>

    <section class="card actions-card">
      <button id="saveBtn" type="button">Save List</button>
      <button id="emailBtn" type="button">Email to Me</button>
      <button id="textBtn" type="button">Text to Me</button>
      <button id="clearCompletedBtn" type="button">Clear Done</button>
      <button id="clearAllBtn" class="danger" type="button">Clear All</button>
    </section>
  </main>

  <template id="taskTemplate">
    <li class="task-item" draggable="true">
      <button class="check-btn" type="button" aria-label="Mark task complete"></button>
      <input class="task-text" aria-label="Task text" />
      <button class="delete-btn" type="button" aria-label="Delete task">×</button>
    </li>
  </template>

  <script src="script.js"></script>
</body>
</html>
