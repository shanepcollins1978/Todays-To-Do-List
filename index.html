<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shane's Today To-Do List</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Today</p>
        <h1>Shane's To-Do List</h1>
        <p class="subtitle">Tasks, daily habits, and a clean finish line for the day.</p>
      </div>
      <div class="date-card">
        <span id="dayName">Today</span>
        <strong id="todayDate"></strong>
      </div>
    </header>

    <section class="card input-card" aria-labelledby="task-heading">
      <h2 id="task-heading">Add a task</h2>
      <div class="input-row">
        <input id="taskInput" type="text" placeholder="What needs to get done?" autocomplete="off" />
        <button id="addTaskBtn">Add</button>
      </div>
    </section>

    <section class="card" aria-labelledby="habits-heading">
      <div class="section-header">
        <div>
          <h2 id="habits-heading">Daily Habits</h2>
          <p id="habitCount">0 of 0 completed</p>
        </div>
        <button class="secondary" id="resetHabitsBtn">Reset habits</button>
      </div>

      <div class="input-row compact">
        <input id="habitInput" type="text" placeholder="Add a daily habit" autocomplete="off" />
        <button id="addHabitBtn">Add Habit</button>
      </div>

      <ul id="habitList" class="list habit-list"></ul>
    </section>

    <section class="card" aria-labelledby="tasks-heading">
      <div class="section-header">
        <div>
          <h2 id="tasks-heading">Today's Tasks</h2>
          <p id="taskCount">0 tasks</p>
        </div>
        <button class="secondary" id="clearCompletedBtn">Clear completed</button>
      </div>
      <ul id="taskList" class="list"></ul>
    </section>

    <section class="action-grid">
      <button id="emailBtn" class="action-btn">Email List</button>
      <button id="textBtn" class="action-btn">Text List</button>
      <button id="clearAllBtn" class="action-btn danger">Clear All</button>
    </section>

    <p id="saveStatus" class="save-status">Saved on this device</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
