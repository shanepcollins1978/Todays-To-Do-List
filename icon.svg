<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">To-do list icon</title>
  <desc id="desc">A rounded app icon showing a paper list with checkboxes and task lines.</desc>
  <defs>
    <linearGradient id="bg" x1="72" y1="48" x2="440" y2="464" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="72" y="70" width="368" height="382" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#020617" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="118" y="96" width="276" height="320" rx="34" fill="#ffffff"/>
    <rect x="156" y="82" width="200" height="58" rx="24" fill="#dbeafe"/>
    <rect x="198" y="68" width="116" height="48" rx="24" fill="#60a5fa"/>
  </g>

