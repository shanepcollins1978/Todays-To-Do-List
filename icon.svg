    <path d="M174 198l9 9 21-25" stroke="#16a34a" stroke-width="14"/>
    <path d="M238 188h98" stroke="#334155" stroke-width="18"/>
    <path d="M238 214h72" stroke="#94a3b8" stroke-width="14"/>

    <rect x="164" y="255" width="38" height="38" rx="10" stroke="#2563eb" stroke-width="16"/>
    <path d="M174 274l9 9 21-25" stroke="#16a34a" stroke-width="14"/>
    <path d="M238 264h98" stroke="#334155" stroke-width="18"/>
    <path d="M238 290h72" stroke="#94a3b8" stroke-width="14"/>

    <rect x="164" y="331" width="38" height="38" rx="10" stroke="#2563eb" stroke-width="16"/>
    <path d="M238 340h98" stroke="#334155" stroke-width="18"/>
    <path d="M238 366h72" stroke="#94a3b8" stroke-width="14"/>
  </g>
